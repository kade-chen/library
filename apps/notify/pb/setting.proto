syntax = "proto3";

package kade_chen.google_billing_console.notify;

option go_package = "github.com/kade-chen/google-billing-console/apps/notify";

import "google-billing-console/apps/notify/pb/mail.proto";
import "google-billing-console/apps/notify/pb/sms.proto";
import "google-billing-console/apps/notify/pb/voice.proto";

message NotifySetting {
  // 邮箱配置
  // @gotags: bson:"mail_config" json:"mail_config" bigquery:"mail_config"
  MailConfig mail_config = 1;

  // 短信配置
  // @gotags: bson:"sms_config" json:"sms_config" bigquery:"sms_config"
  SmsConfig sms_config = 2;

  // 语音通知配置
  // @gotags: bson:"voice_config" json:"voice_config" bigquery:"voice_config"
  VoiceConfig voice_config = 3;
}